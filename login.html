<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Iniciar sesión — Inmobiliaria</title>
    <meta name="description" content="Área de acceso para empleados y clientes de la inmobiliaria">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gray-50 flex items-center justify-center">
    <main class="w-full max-w-md p-6">
      <section class="bg-white shadow-md rounded-lg p-6">
        <div class="flex items-center gap-4 mb-6">
          <div class="w-12 h-12 bg-indigo-600 text-white rounded flex items-center justify-center">
            <!-- Icono simple -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7l9-4 9 4M4 10v6a1 1 0 001 1h3m10-7v7a1 1 0 01-1 1h-3M7 21h10" />
            </svg>
          </div>
          <div>
            <h1 class="text-xl font-semibold text-gray-800">Inmobiliaria Aurea</h1>
            <p class="text-sm text-gray-500">Panel seguro de acceso</p>
          </div>
        </div>

        <form action="config.php" method="post" class="space-y-4" novalidate>
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Correo electrónico</label>
            <input id="email" name="email" type="email" required autocomplete="email" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="nombre@empresa.com">
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
            <input id="password" name="password" type="password" required autocomplete="current-password" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="********">
          </div>

          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2">
              <input type="checkbox" name="remember" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
              <span class="text-gray-600">Recuérdame</span>
            </label>
            <a href="#" class="text-indigo-600 hover:underline">¿Olvidó su contraseña?</a>
          </div>

          <div>
            <button type="submit" class="w-full inline-flex items-center justify-center px-4 py-2 bg-indigo-600 text-white font-semibold rounded hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">Iniciar sesión</button>
          </div>
        </form>

        <footer class="mt-6 text-center text-xs text-gray-500">
          <p>© <span id="year"></span> Inmobiliaria Aurea — Todos los derechos reservados</p>
        </footer>
      </section>
    </main>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
